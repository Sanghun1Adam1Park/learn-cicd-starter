name: cd

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.25.1

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build
        run: ./scripts/buildprod.sh

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCO_CREDENTIALS }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Use gcloud CLI
        run: gcloud info

      - name: Build and push Docker image
        run: gcloud builds submit --tag europe-west4-docker.pkg.dev/omega-winter-488918-n7/notely-ar-repo/sanghunpark0628/notely:latest .

      - name: Deploy to Cloud Run
        run: gcloud run deploy notely --image europe-west4-docker.pkg.dev/omega-winter-488918-n7/notely-ar-repo/sanghunpark0628/notely:latest --region europe-west4 --allow-unauthenticated --project omega-winter-488918-n7 --max-instances=4

